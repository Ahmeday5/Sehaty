<nav class="sidebar" [class.collapsed]="layout.collapsed()" [class.open]="layout.mobileOpen()">

  <!-- Brand -->
  <div class="sb-brand">
    <div class="sb-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <div>
      <span class="sb-brand-name">شفاء</span>
      <div class="sb-brand-sub">لوحة التحكم</div>
    </div>
  </div>

  <!-- Scrollable nav -->
  <div class="sb-scroll">
    @for (section of visibleSections(); track section.label) {
    <p class="sb-sec">{{ section.label }}</p>

    @for (item of section.items; track item.id) {
    <a class="sbi" [routerLink]="item.route" routerLinkActive="on" [title]="layout.collapsed() ? item.label : ''"
      (click)="layout.closeMobile()">
      <span class="sbi-icon-wrap">
        <app-nav-icon [name]="item.icon" [size]="17"></app-nav-icon>
      </span>
      <span class="sbi-label">{{ item.label }}</span>
      @if (item.badge) {
      <span [class]="getBadgeClass(item.badgeType)">{{ item.badge }}</span>
      }
    </a>
    }
    }
  </div>

  <!-- Collapse toggle (desktop only) -->
  <button class="sb-toggle" (click)="layout.toggleCollapsed()"
    [title]="layout.collapsed() ? 'توسيع القائمة' : 'تصغير القائمة'">
    <svg class="sb-toggle-icon" [class.sb-toggle-icon--flipped]="layout.collapsed()" width="14" height="14"
      viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span class="sb-toggle-lbl">تصغير</span>
  </button>

</nav>
