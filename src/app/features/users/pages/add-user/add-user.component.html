<div class="container-fluid mt-4">
  <h4 class="fw-bold mb-4">إضافة مستخدم جديد</h4>
  <form #form="ngForm" (ngSubmit)="onSubmit(form)">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">الاسم الأول</label>
        <input class="form-control" [(ngModel)]="user.firstName" name="firstName" required></div>
      <div class="col-md-6"><label class="form-label">الاسم الأخير</label>
        <input class="form-control" [(ngModel)]="user.lastName" name="lastName" required></div>
      <div class="col-md-6"><label class="form-label">البريد الإلكتروني</label>
        <input class="form-control" type="email" [(ngModel)]="user.email" name="email" required email></div>
      <div class="col-md-6"><label class="form-label">رقم الهاتف</label>
        <input class="form-control" [(ngModel)]="user.phone" name="phone" required></div>
      <div class="col-md-6"><label class="form-label">رقم الهوية</label>
        <input class="form-control" [(ngModel)]="user.nationalID" name="nationalID" required></div>
      <div class="col-md-6"><label class="form-label">كلمة السر</label>
        <div class="position-relative">
          <input class="form-control" [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="user.password" name="password" required minlength="6">
          <button type="button" class="btn btn-sm position-absolute" style="left:8px;top:50%;transform:translateY(-50%)" (click)="togglePassword()">
            <i class="fa-regular" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
          </button>
        </div>
      </div>
      <div class="col-md-6"><label class="form-label">الدور</label>
        <select class="form-select" [(ngModel)]="user.role" name="role" required>
          <option value="">اختر الدور</option>
          <option value="Admin">مدير</option>
          <option value="Editor">محرر</option>
          <option value="Sales">مبيعات</option>
          <option value="Marketing">تسويق</option>
        </select>
      </div>
      <div class="col-md-6"><label class="form-label">الصورة</label>
        <input class="form-control" type="file" accept="image/*" (change)="onFileChange($event)"></div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn" style="background:var(--second-color);color:#fff" [disabled]="loading()">
        @if (loading()) { <span class="spinner-border spinner-border-sm me-1"></span> }
        إضافة
      </button>
      <a class="btn btn-secondary" routerLink="/users">إلغاء</a>
    </div>
  </form>
</div>
