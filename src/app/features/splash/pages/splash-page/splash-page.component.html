<div class="sp-wrap">

  <!-- Ambient background orbs -->
  <div class="sp-orb sp-orb--1"></div>
  <div class="sp-orb sp-orb--2"></div>
  <div class="sp-orb sp-orb--3"></div>

  <!-- Main content -->
  <div class="sp-content">

    <!-- Logo ring -->
    <div class="sp-logo-ring">
      <div class="sp-logo-ring-inner">
        <img src="/assets/img/logo-login.png" class="sp-logo"
             alt="صحتي" onerror="this.style.display='none'">
        <i class="fa-solid fa-heart-pulse sp-logo-fallback"></i>
      </div>
    </div>

    <!-- Brand name -->
    <div class="sp-brand">
      <h1 class="sp-name">صحتي</h1>
      <p class="sp-tagline">منصة إدارة الرعاية الصحية</p>
    </div>

    <!-- Progress bar -->
    <div class="sp-progress-wrap">
      <div class="sp-progress-bar"></div>
    </div>

    <!-- Version hint -->
    <span class="sp-version">v1.0</span>
  </div>

</div>
