<form class="df" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate dir="rtl">

  <!-- image upload -->
  <div class="df-img-row">
    <label class="df-img-picker" for="pf-img">
      @if (imagePreview()) {
        <img class="df-img-preview" [src]="imagePreview()!" alt="شعار الصيدلية">
        <div class="df-img-change-overlay"><i class="fa-solid fa-camera"></i></div>
      } @else {
        <i class="fa-solid fa-prescription-bottle-medical df-img-icon"></i>
        <span class="df-img-hint">صورة الصيدلية</span>
      }
      <input id="pf-img" type="file" accept="image/*" class="df-file-hidden" (change)="onImageChange($event)">
    </label>
    <p class="df-img-sub">اضغط لرفع أو تغيير الصورة</p>
  </div>

  <!-- fields grid -->
  <div class="df-grid">

    <div class="df-field">
      <label class="df-label" for="pf-name">اسم الصيدلية <span class="df-req">*</span></label>
      <input id="pf-name" class="form-control" formControlName="name" placeholder="صيدلية النور">
      <app-form-error [control]="form.get('name')"></app-form-error>
    </div>

    <div class="df-field">
      <label class="df-label" for="pf-owner">اسم المالك <span class="df-req">*</span></label>
      <input id="pf-owner" class="form-control" formControlName="ownerName" placeholder="محمد أحمد">
      <app-form-error [control]="form.get('ownerName')"></app-form-error>
    </div>

    <div class="df-field">
      <label class="df-label" for="pf-phone">رقم الهاتف <span class="df-req">*</span></label>
      <input id="pf-phone" class="form-control" formControlName="phone" placeholder="01xxxxxxxxx" dir="ltr">
      <app-form-error [control]="form.get('phone')" patternMsg="رقم هاتف غير صحيح"></app-form-error>
    </div>

    <div class="df-field">
      <label class="df-label" for="pf-license">رقم الترخيص <span class="df-req">*</span></label>
      <input id="pf-license" class="form-control" formControlName="licenseNumber" placeholder="PH-XXXXX" dir="ltr">
      <app-form-error [control]="form.get('licenseNumber')"></app-form-error>
    </div>

    @if (!isEdit) {
      <div class="df-field">
        <label class="df-label" for="pf-email">البريد الإلكتروني <span class="df-req">*</span></label>
        <input id="pf-email" type="email" class="form-control" formControlName="email"
               placeholder="pharmacy@example.com" dir="ltr">
        <app-form-error [control]="form.get('email')"></app-form-error>
      </div>

      <div class="df-field">
        <label class="df-label" for="pf-pass">كلمة المرور <span class="df-req">*</span></label>
        <input id="pf-pass" type="password" class="form-control" formControlName="password"
               placeholder="6 أحرف على الأقل" dir="ltr">
        <app-form-error [control]="form.get('password')"></app-form-error>
      </div>
    }

  </div>

  <!-- address full width -->
  <div class="df-field">
    <label class="df-label" for="pf-addr">العنوان <span class="df-req">*</span></label>
    <input id="pf-addr" class="form-control" formControlName="address" placeholder="الشارع، الحي، المدينة">
    <app-form-error [control]="form.get('address')"></app-form-error>
  </div>

  <!-- footer -->
  <div class="df-footer">
    <button type="button" class="df-btn df-btn--cancel" (click)="cancelled.emit()" [disabled]="submitting()">
      إلغاء
    </button>
    <button type="submit" class="df-btn df-btn--save" [disabled]="submitting()">
      @if (submitting()) {
        <span class="spinner-border spinner-border-sm" role="status"></span>
        جاري الحفظ...
      } @else {
        <i class="fa-solid fa-check"></i>
        {{ isEdit ? 'حفظ التعديلات' : 'إضافة الصيدلية' }}
      }
    </button>
  </div>

</form>
