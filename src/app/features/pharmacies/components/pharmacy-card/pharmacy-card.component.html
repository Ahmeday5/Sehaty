<article class="pc" [class.pc--inactive]="!pharmacy().isActive" dir="rtl">

  <!-- top bar: status -->
  <div class="pc-top">
    <span class="pc-status" [class.pc-status--on]="pharmacy().isActive">
      <span class="pc-status-dot"></span>
      {{ pharmacy().isActive ? 'نشط' : 'معطّل' }}
    </span>
    @if (hasCoordinates) {
      <a class="pc-map-btn" [href]="googleMapsUrl" target="_blank" rel="noopener" title="عرض على خرائط جوجل">
        <i class="fa-solid fa-location-dot"></i>
        <span>الموقع</span>
      </a>
    }
  </div>

  <!-- avatar -->
  <div class="pc-avatar-wrap">
    @if (pharmacy().imageUrl && !imageFailed) {
      <img class="pc-avatar" [src]="pharmacy().imageUrl!" [alt]="pharmacy().name" (error)="onImageError()">
    } @else {
      <div class="pc-avatar pc-avatar--placeholder">
        <i class="fa-solid fa-prescription-bottle-medical"></i>
      </div>
    }
  </div>

  <!-- identity -->
  <div class="pc-identity">
    <h3 class="pc-name">{{ pharmacy().name }}</h3>
    <p class="pc-phone">
      <i class="fa-solid fa-phone"></i>
      {{ pharmacy().phone }}
    </p>
  </div>

  <!-- address -->
  <div class="pc-address">
    <i class="fa-solid fa-location-dot"></i>
    <span>{{ pharmacy().address }}</span>
  </div>

  <!-- actions -->
  <div class="pc-actions">
    <button
      class="pc-action"
      [class.pc-action--activate]="!pharmacy().isActive"
      [class.pc-action--deactivate]="pharmacy().isActive"
      (click)="toggleActive.emit(pharmacy())"
      [title]="pharmacy().isActive ? 'تعطيل' : 'تفعيل'">
      <i class="fa-solid" [class.fa-toggle-on]="pharmacy().isActive" [class.fa-toggle-off]="!pharmacy().isActive"></i>
      <span>{{ pharmacy().isActive ? 'تعطيل' : 'تفعيل' }}</span>
    </button>
    <button class="pc-action pc-action--delete" (click)="delete.emit(pharmacy())" title="حذف">
      <i class="fa-solid fa-trash-can"></i>
      <span>حذف</span>
    </button>
  </div>

</article>
