<div class="disc-page" dir="rtl">

  <div class="page-header">
    <div class="d-flex align-items-center gap-3">
      <div class="disc-header-icon">
        <i class="fa-solid fa-percent"></i>
      </div>
      <div>
        <h1 class="page-title mb-0">الخصومات والعروض</h1>
        <p class="text-muted mb-0" style="font-size:0.82rem">إدارة الخصومات والكوبونات والباقات الطبية</p>
      </div>
    </div>
  </div>

  <app-kpi-strip [items]="kpiItems" />

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-4">
    <app-tabs-nav [tabs]="tabs" [activeTab]="activeTab()" (tabChange)="setTab($event)" />
  </div>

  @switch (activeTab()) {
  @case ('apply') { <app-apply-discount /> }
  @case ('coupons') { <app-coupons-list /> }
  @case ('auto') { <app-auto-discounts /> }
  @case ('packages') { <app-packages /> }
  }

</div>
