<div class="disc-page" dir="rtl">

  <!-- Header -->
  <div class="disc-header">
    <div class="disc-header__title">
      <div class="disc-header__icon"><i class="fa-solid fa-percent"></i></div>
      <div>
        <h1>تطبيق الخصومات</h1>
        <p>تطبيق خصم على مواعيد الأطباء</p>
      </div>
    </div>
  </div>

  <!-- Single card -->
  <div class="disc-card">
    <div class="disc-card__head">
      <span class="disc-card__icon">
        <i class="fa-solid fa-calendar-check"></i>
      </span>
      <span class="disc-card__label">تطبيق خصم على مواعيد طبيب</span>
    </div>

    <div class="disc-card__body">

      <!-- Doctor select -->
      <div class="field-group">
        <label>الطبيب</label>
        @if (loadingDoctors()) {
          <div class="select-loading">
            <span class="spinner-border spinner-border-sm"></span>
            <span>جاري تحميل الأطباء...</span>
          </div>
        } @else {
          <select class="form-select" [(ngModel)]="applyForm.doctorId">
            <option value="">— اختر الطبيب —</option>
            @for (doc of doctors(); track doc.id) {
              <option [value]="doc.id">{{ doc.name }} — {{ doc.specialization }}</option>
            }
          </select>
        }
      </div>

      <!-- Date -->
      <div class="field-group">
        <label>التاريخ</label>
        <input class="form-control" type="date" [(ngModel)]="applyForm.date">
      </div>

      <!-- Percentage -->
      <div class="field-group">
        <label>نسبة الخصم %</label>
        <input class="form-control" type="number" min="1" max="100"
               [(ngModel)]="applyForm.discountPercentage" placeholder="مثال: 100">
      </div>

      <!-- Info note -->
      <div class="info-note">
        <i class="fa-solid fa-circle-info"></i>
        قد تظهر رسالة &quot;لا توجد مواعيد متاحة&quot; إذا لم يكن للطبيب مواعيد في هذا التاريخ.
      </div>

    </div>

    <div class="disc-card__footer">
      <button class="btn-action" (click)="onApply()" [disabled]="applying() || loadingDoctors()">
        @if (applying()) {
          <span class="spinner-border spinner-border-sm"></span>
        } @else {
          <i class="fa-solid fa-check"></i>
        }
        تطبيق الخصم
      </button>
    </div>
  </div>

</div>
